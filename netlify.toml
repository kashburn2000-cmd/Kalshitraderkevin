[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/kalshi/:splat"
  status = 200

[functions."alert"]
  schedule = "*/5 * * * *"

[[redirects]]
  from = "/alert"
  to = "/.netlify/functions/alert"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
