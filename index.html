<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d0f;
    --bg2: #111316;
    --bg3: #181b1f;
    --bg4: #1e2227;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaed;
    --text2: #8a9099;
    --text3: #545b64;
    --green: #00d97e;
    --green-dim: rgba(0,217,126,0.12);
    --red: #ff4d4d;
    --red-dim: rgba(255,77,77,0.12);
    --amber: #ffb830;
    --amber-dim: rgba(255,184,48,0.12);
    --blue: #3d9eff;
    --blue-dim: rgba(61,158,255,0.1);
    --accent: #00d97e;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.5; }

  /* Scrollbar */

  ::-webkit-scrollbar-track { background: transparent; }

  /* Layout */
  .app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; overflow: hidden; }
  .topbar { display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 16px; }
  .logo { font-family: var(--font-head); font-weight: 800; font-size: 16px; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--text2); font-weight: 400; }
  .topbar-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); margin-left: auto; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }

  .main { display: grid; grid-template-columns: 240px 1fr 280px; overflow: hidden; }

  /* Sidebar */
  .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 12px 0; }
  .sidebar-section { padding: 6px 12px 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-top: 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--text2); border-left: 2px solid transparent; transition: all 0.1s; user-select: none; }

  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--green-dim); }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; }

  /* Table */

  td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }

  .badge-yes { background: var(--green-dim); color: var(--green); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--r); border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 12px; font-family: var(--font-body); cursor: pointer; transition: all 0.1s; user-select: none; white-space: nowrap; }

  .btn-primary { background: var(--green-dim); border-color: var(--green); color: var(--green); }

  .btn-danger { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* Inputs */
  input[type=text], input[type=number], select {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r);
    color: var(--text); font-family: var(--font-body); font-size: 13px;

  input[type=text]:focus, input[type=number]:focus, select:focus { border-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }

  /* Config panel */

  /* PnL chart mini */

  .spark-bar.neg { background: var(--red); opacity: 0.7; }

  /* Log */
  .log-area { font-family: var(--font-mono); font-size: 11px; color: var(--text2); height: 160px; overflow-y: auto; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
  .log-line { display: flex; gap: 8px; }
  .log-time { color: var(--text3); flex-shrink: 0; }
  .log-info { color: var(--text2); }
  .log-ok { color: var(--green); }

  /* Positions */
  .position-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .pos-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .pos-ticker { font-family: var(--font-mono); font-size: 12px; font-weight: 500; }
  .pos-pnl { font-family: var(--font-mono); font-size: 12px; }
  .pos-detail { display: flex; gap: 12px; font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .pos-bar-wrap { height: 3px; background: var(--bg4); border-radius: 2px; margin-top: 6px; }
  .pos-bar { height: 3px; border-radius: 2px; background: var(--green); transition: width 0.3s; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab { padding: 8px 14px; font-size: 12px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.1s; user-select: none; }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Mode toggle */
  .mode-toggle { display: flex; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .mode-btn { padding: 5px 12px; font-size: 11px; cursor: pointer; color: var(--text3); transition: all 0.1s; user-select: none; font-family: var(--font-mono); }
  .mode-btn.active { background: var(--bg4); color: var(--text); }

  /* Scan progress */
  .scan-pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }
  .empty-msg { font-size: 13px; }

  /* Base rates table */
  .br-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .br-kw { font-family: var(--font-mono); font-size: 11px; color: var(--text); min-width: 120px; }
  .br-bar-wrap { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; }
  .br-bar { height: 4px; border-radius: 2px; }
  .br-pct { font-family: var(--font-mono); font-size: 11px; min-width: 36px; text-align: right; }
  .br-n { font-size: 10px; color: var(--text3); min-width: 28px; text-align: right; }

  /* Tooltip */
  .tooltip-wrap { position: relative; display: inline-flex; }
  .tooltip-text { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--r); padding: 5px 9px; font-size: 11px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; color: var(--text); }
  .tooltip-wrap:hover .tooltip-text { opacity: 1; }

  /* Scrollable list */
  .scroll-list { overflow-y: auto; flex: 1; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-family: var(--font-head); font-weight: 700; font-size: 18px; color: var(--text); }

  input[type=range] { width: 100%; accent-color: var(--accent); }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// Public endpoints go directly to Kalshi (no auth needed, no proxy needed).
// Authenticated endpoints (orders, balance, positions) go through /api proxy.
const KALSHI_PUBLIC = 'https://api.elections.kalshi.com/trade-api/v2';
const IS_PROXIED = window.location.hostname !== 'localhost' && window.location.protocol !== 'file:';
const BASE = IS_PROXIED ? '/api' : KALSHI_PUBLIC;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmtPct = v => (v * 100).toFixed(0) + "¢";
const fmtDollar = v => (v >= 0 ? "+" : "") + "$" + Math.abs(v).toFixed(2);
const fmtTime = () => new Date().toTimeString().slice(0, 8);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const fmtRelTime = iso => {
  if (!iso) return "";
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
};

const MENTION_KWS = ["mention", "say", "said", "utter", "speak", "word", "phrase",
  "sotu", "speech", "address", "press conference", "earnings", "debate", "will use",
  "trump", "biden", "powell", "fomc", "fed ", "conference", "call", "kxtrump", "kxfomc",
  "kxsotu", "kxearnings", "mention", "says", "stated", "announce"];
const isMention = m => {
  const s = [m.title, m.yes_sub_title, m.no_sub_title, m.event_ticker, m.ticker, m.series_ticker]
    .filter(Boolean).join(" ").toLowerCase();
  // Also match on ticker patterns like KXTRUMPMENTION
  if (/kx.*mention/i.test(s)) return true;
  if (/kx.*say/i.test(s)) return true;
  if (/kx.*word/i.test(s)) return true;
  return MENTION_KWS.some(k => s.includes(k));
};

const FILLER_WORDS = new Set(["the","a","an","will","say","said","says","be","mentioned","mention","during","speech","address","in","his","her","at","to","of","and","or","is","it","that","this","for","on","with","by","from","he","she","they","its","their","stated","announce","use","word","phrase"]);

function normalizeKw(raw) {
  // 1. Handle slash-separated variants: keep ALL terms (replace / with space)
  let s = raw.replace(/\s*\/\s*/g, " ");
  // 2. Strip punctuation except hyphens within words
  s = s.replace(/[''"""\u2018\u2019\u201C\u201D]/g, "").replace(/[^\w\s-]/g, " ");
  // 3. Lowercase, split, strip filler, rejoin
  const words = s.toLowerCase().split(/\s+/).filter(w => w.length > 0 && !FILLER_WORDS.has(w));
  // 4. Strip trailing 's' for naive depluralization (but protect short words and known terms)
  const deplural = words.map(w => (w.length > 3 && w.endsWith("s") && !w.endsWith("ss")) ? w.slice(0, -1) : w);
  return deplural.join(" ").trim().slice(0, 30) || raw.toLowerCase().trim().slice(0, 30);
}

// Aliases map variant keywords to canonical seed keys
const SEED_ALIASES = { "btc": "crypto", "bitcoin": "crypto", "cryptocurrency": "crypto", "cryptocurrenc": "crypto", "digital currency": "crypto" };

function matchSeedKey(normalized, seedKeys) {
  // Exact match first
  if (seedKeys.includes(normalized)) return normalized;
  // Check aliases
  if (SEED_ALIASES[normalized] && seedKeys.includes(SEED_ALIASES[normalized])) return SEED_ALIASES[normalized];
  // Check if normalized contains or is contained in a seed key
  for (const sk of seedKeys) {
    if (normalized.includes(sk) || sk.includes(normalized)) return sk;
    // Check individual words of multi-word normalized string
    const nWords = normalized.split(" ");
    if (nWords.some(w => w === sk || (SEED_ALIASES[w] === sk))) return sk;
  }
  // Check aliases for individual words
  const nWords = normalized.split(" ");
  for (const w of nWords) {
    if (SEED_ALIASES[w] && seedKeys.includes(SEED_ALIASES[w])) return SEED_ALIASES[w];
  }
  return normalized;
}

const extractKw = m => {
  const src = [m.yes_sub_title, m.title].join(" ");
  const quoted = src.match(/['"'""\u2018\u2019\u201C\u201D](.+?)['"'""\u2018\u2019\u201C\u201D]/);
  let raw;
  if (quoted) {
    raw = quoted[1];
  } else {
    raw = (m.yes_sub_title || m.title || "");
  }
  return normalizeKw(raw);
};

// ── Kalshi API (no auth needed for public market data) ────────────────────────
// ── Authenticated API calls (require env vars set in Netlify) ────────────────
async function checkAuth() {
  if (!IS_PROXIED) return { ok: false, reason: 'Running locally' };
  try {
    const d = await kalshiFetch('/portfolio/balance');
    return { ok: true, balance: (d.balance || 0) / 100 };
  } catch(e) {
    // Distinguish "creds not set" from "network error"
    if (e.message.includes('500')) return { ok: false, reason: 'API key not configured in Netlify env vars' };
    if (e.message.includes('502')) return { ok: false, reason: 'Proxy cannot reach Kalshi — check function logs' };
    return { ok: false, reason: e.message };
  }
}

async function fetchBalance() {
  const d = await kalshiFetch('/portfolio/balance');
  return (d.balance || 0) / 100;
}

async function fetchPositions() {
  const d = await kalshiFetch('/portfolio/positions');
  return d.market_positions || [];
}

async function placeRealOrder(ticker, side, priceCents, count) {
  const body = { ticker, action: "buy", side, type: "limit", count, yes_price: side === "yes" ? priceCents : 100 - priceCents };
  const r = await fetch(BASE + '/orders', { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Order failed"); }
  return r.json();
}

// All API calls go through /api proxy (avoids CORS — Kalshi blocks direct browser calls)
async function kalshiFetch(path, params = {}) {
  const qs = new URLSearchParams(params).toString();
  const url = `${BASE}${path}${qs ? "?" + qs : ""}`;
  const r = await fetch(url);
  if (!r.ok) {
    let detail = "";
    try { const e = await r.json(); detail = e.detail || e.error || ""; } catch {}
    throw new Error(`HTTP ${r.status}${detail ? ": " + detail : ""}`);
  }
  return r.json();
}

async function fetchMarkets(seriesFilter = "") {
  const params = { status: "open", limit: "200" };
  if (seriesFilter) params.series_ticker = seriesFilter;
  const d = await kalshiFetch("/markets", params);
  return (d.markets || []).filter(isMention);
}

async function fetchSettled(seriesFilter = "") {
  const params = { status: "settled", limit: "200" };
  if (seriesFilter) params.series_ticker = seriesFilter;
  const d = await kalshiFetch("/markets", params);
  return (d.markets || []).filter(isMention).filter(m => m.result === "yes" || m.result === "no");
}

// ── Strategy ─────────────────────────────────────────────────────────────────
function buildBaseRates(settledMarkets) {
  const seedKeys = Object.keys(SEED_RATES);
  const counts = {};
  for (const m of settledMarkets) {
    const rawKw = extractKw(m);
    // Fuzzy-match against seed keys so "economic" merges into "economy" etc.
    const kw = matchSeedKey(rawKw, seedKeys);
    console.log(`[BaseRates] ticker=${m.ticker} raw="${rawKw}" → matched="${kw}" result=${m.result}`);
    if (!counts[kw]) counts[kw] = { yes: 0, no: 0 };
    if (m.result === "yes") counts[kw].yes++;
    else counts[kw].no++;
  }
  // Second pass: merge any remaining duplicates where one key is substring of another
  const merged = {};
  const sortedKeys = Object.keys(counts).sort((a, b) => a.length - b.length);
  for (const kw of sortedKeys) {
    const existing = Object.keys(merged).find(mk => kw.includes(mk) || mk.includes(kw));
    if (existing) {
      merged[existing].yes += counts[kw].yes;
      merged[existing].no += counts[kw].no;
    } else {
      merged[kw] = { ...counts[kw] };
    }
  }
  const rates = {};
  for (const [kw, c] of Object.entries(merged)) {
    const n = c.yes + c.no;
    rates[kw] = { rate: (c.yes + 1) / (n + 2), n, yes: c.yes, no: c.no };
  }
  return rates;
}

const SEED_RATES = {
  "tariff": { rate: 0.75, n: 0, yes: 0, no: 0 },
  "inflation": { rate: 0.68, n: 0, yes: 0, no: 0 },
  "border": { rate: 0.80, n: 0, yes: 0, no: 0 },
  "america": { rate: 0.95, n: 0, yes: 0, no: 0 },
  "economy": { rate: 0.80, n: 0, yes: 0, no: 0 },
  "ai": { rate: 0.65, n: 0, yes: 0, no: 0 },
  "crypto": { rate: 0.22, n: 0, yes: 0, no: 0 },
};

function computeEdge(market, baseRates) {
  const rawKw = extractKw(market);
  const kw = matchSeedKey(rawKw, Object.keys(baseRates));
  const entry = baseRates[kw];
  if (!entry) return null;
  const bid = parseFloat(market.yes_bid_dollars) || null;
  const ask = parseFloat(market.yes_ask_dollars) || null;
  if (bid === null && ask === null) return null; // no price data — skip
  const mid = bid !== null && ask !== null ? (bid + ask) / 2 : (bid || ask);
  const edge = entry.rate - mid;
  return { kw, fv: entry.rate, mid, edge, n: entry.n };
}

// ── Session ID (for audit trail grouping) ────────────────────────────────────
const SESSION_ID = Date.now();

// ── Persistent state hook (Netlify Blobs + localStorage fallback) ────────────
function usePersistentState(key, defaultValue) {
  const [state, setState] = React.useState(defaultValue);
  const [synced, setSynced] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const savingRef = React.useRef(0);

  // Load from Blobs on mount
  React.useEffect(() => {
    fetch(`/state?key=${key}`)
      .then(r => r.json())
      .then(d => {
        if (d.value !== null && d.value !== undefined) {
          setState(d.value);
        } else {
          try {
            const local = localStorage.getItem(key);
            if (local) setState(JSON.parse(local));
          } catch {}
        }
        setSynced(true);
      })
      .catch(() => {
        try {
          const local = localStorage.getItem(key);
          if (local) setState(JSON.parse(local));
        } catch {}
        setSynced(true);
      });
  }, [key]);

  const setPersistentState = React.useCallback((value) => {
    setState(prev => {
      const next = typeof value === 'function' ? value(prev) : value;
      savingRef.current++;
      setSaving(true);
      fetch('/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, value: next }),
      }).catch(() => {
        try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      }).finally(() => {
        savingRef.current--;
        if (savingRef.current <= 0) { savingRef.current = 0; setSaving(false); }
      });
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);

  return [state, setPersistentState, synced, saving];
}

// ── Log ───────────────────────────────────────────────────────────────────────
function useLog() {
  const [lines, setLines] = useState([]);
  const add = useCallback((msg, type = "info") => {
    setLines(prev => [...prev.slice(-80), { t: fmtTime(), msg, type }]);
  }, []);
  return [lines, add];
}

// ── Simulated paper order book ────────────────────────────────────────────────
let orderIdSeq = 1;
function makePaperOrder(ticker, side, price, qty, kw, fv, edge, kellySize) {
  return { id: `P${orderIdSeq++}`, ticker, side, price, qty, kw, fv, ts: new Date().toISOString(), status: "open", mode: "paper", edge: edge || 0, kellySize: kellySize || null, sessionId: SESSION_ID };
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("scanner");
  const [scanning, setScanning] = useState(false);
  const [markets, setMarkets] = useState([]);
  const [settled, setSettled] = useState([]);
  const [signals, setSignals] = useState([]);
  const [backtesting, setBacktesting] = useState(false);
  const [logs, addLog] = useLog();
  const [apiError, setApiError] = useState(null);
  const [authStatus, setAuthStatus] = useState(null); // null | {ok, balance?, reason?}
  const [liveBalance, setLiveBalance] = useState(null);
  const [lastScan, setLastScan] = useState(null);

  // Persisted state (Netlify Blobs + localStorage fallback)
  const [positions, setPositions, positionsSynced, positionsSaving] = usePersistentState('kbt_positions', []);
  const [orders, setOrders, ordersSynced, ordersSaving] = usePersistentState('kbt_orders', []);
  const [baseRates, setBaseRates] = usePersistentState('kbt_base_rates', SEED_RATES);
  const [seriesFilter, setSeriesFilter] = usePersistentState('kbt_series_filter', 'KXTRUMPMENTION');
  const [minEdge, setMinEdge] = usePersistentState('kbt_min_edge', 0.08);
  const [maxSize, setMaxSize] = usePersistentState('kbt_max_size', 10);
  const [mode, setMode, modeSynced, modeSaving] = usePersistentState('kbt_mode', 'paper');
  const [backtestResults, setBacktestResults] = usePersistentState('kbt_backtest_results', null);

  // Saving indicator — true if any persisted state is writing
  const saving = positionsSaving || ordersSaving || modeSaving;

  // "Restored N positions" banner
  const [restoredBanner, setRestoredBanner] = useState(null);
  useEffect(() => {
    if (positionsSynced && positions.length > 0 && !restoredBanner) {
      setRestoredBanner(`Restored ${positions.length} position${positions.length > 1 ? 's' : ''} from last session`);
      const timer = setTimeout(() => setRestoredBanner(null), 3000);
      return () => clearTimeout(timer);
    }
  }, [positionsSynced]);

  // Live mode reconciliation — only when mode toggles to "live"
  const prevModeRef = useRef(null);
  useEffect(() => {
    if (prevModeRef.current !== null && prevModeRef.current !== 'live' && mode === 'live' && authStatus && authStatus.ok) {
      // Reconcile positions against Kalshi
      addLog('[LIVE] Reconciling positions with Kalshi...', 'info');
      fetchPositions().then(kalshiPositions => {
        const kalshiTickers = new Set(kalshiPositions.map(p => p.ticker));
        const localTickers = new Set(positions.map(p => p.ticker));
        const toAdd = kalshiPositions.filter(p => !localTickers.has(p.ticker));
        const unconfirmed = positions.filter(p => p.status === 'open' && !kalshiTickers.has(p.ticker));

        if (toAdd.length > 0 || unconfirmed.length > 0) {
          setReconciliation({ added: toAdd, unconfirmed });
          addLog(`[LIVE] Reconciliation: ${toAdd.length} new from Kalshi, ${unconfirmed.length} unconfirmed local`, 'warn');
          // Add missing Kalshi positions
          if (toAdd.length > 0) {
            setPositions(prev => [
              ...prev,
              ...toAdd.map(p => ({
                id: p.ticker + '-reconciled-' + Date.now(),
                ticker: p.ticker,
                side: p.side || 'yes',
                price: 0,
                qty: p.total_traded || 0,
                kw: '',
                fv: 0,
                ts: new Date().toISOString(),
                status: 'open',
                pnl: 0,
                entryTime: new Date(),
                reconciled: true,
              }))
            ]);
          }
          // Mark unconfirmed
          if (unconfirmed.length > 0) {
            setPositions(prev => prev.map(p =>
              unconfirmed.some(u => u.id === p.id) ? { ...p, unconfirmed: true } : p
            ));
          }
        } else {
          addLog('[LIVE] Positions in sync with Kalshi', 'ok');
        }
      }).catch(e => {
        addLog('[LIVE] Reconciliation failed: ' + e.message, 'err');
      });
    }
    prevModeRef.current = mode;
  }, [mode]);

  const [reconciliation, setReconciliation] = useState(null);
  const scanInterval = useRef(null);
  const alertInterval = useRef(null);
  const knownTickers = useRef(new Set());
  const [newMarketAlert, setNewMarketAlert] = useState(null);
  const logRef = useRef(null);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs]);

  // Check auth on mount (only when proxied/hosted)
  useEffect(() => {
    if (typeof IS_PROXIED !== 'undefined' && IS_PROXIED) {
      checkAuth().then(status => {
        setAuthStatus(status);
        if (status.ok) setLiveBalance(status.balance);
      });
    }
  }, []);

  const totalPnl = positions.reduce((s, p) => s + (p.pnl || 0), 0);
  const openExposure = positions.filter(p => p.status === "open").reduce((s, p) => s + p.price * p.qty, 0);

  // Scan
  async function runScan() {
    setScanning(true);
    setApiError(null);
    addLog("Scanning for mentions markets...", "info");
    try {
      const ms = await fetchMarkets(seriesFilter);
      setMarkets(ms);
      addLog(`Found ${ms.length} open mentions markets`, "ok");

      const sigs = ms.map(m => {
        const e = computeEdge(m, baseRates);
        if (!e || Math.abs(e.edge) < minEdge) return null;
        if (e.n < 3) return null; // confidence filter: require n≥3 observations
        return { market: m, ...e };
      }).filter(Boolean).sort((a, b) => Math.abs(b.edge) - Math.abs(a.edge));

      setSignals(sigs);
      setLastScan(new Date());
      if (sigs.length > 0) addLog(`${sigs.length} signals above ${(minEdge * 100).toFixed(0)}¢ edge (n≥3)`, "ok");
      else addLog("No signals above threshold (n≥3 required)", "warn");
    } catch (e) {
      setApiError(e.message);
      addLog("Scan failed: " + e.message, "err");
    }
    setScanning(false);
  }

  // Backtest
  async function runBacktest() {
    setBacktesting(true);
    setBacktestResults(null);
    addLog("Fetching settled mentions markets for backtest...", "info");
    try {
      // First fetch ALL settled markets to see what exists
      const params = new URLSearchParams({ status: "settled", limit: "200" });
      if (seriesFilter) params.set("series_ticker", seriesFilter);
      const raw = await kalshiFetch("/markets", Object.fromEntries(params));
      const allSettled = raw.markets || [];
      addLog(`API returned ${allSettled.length} total settled markets`, "ok");

      const s = allSettled.filter(isMention).filter(m => m.result === "yes" || m.result === "no");
      setSettled(s);
      addLog(`${s.length} matched as mentions markets`, s.length > 0 ? "ok" : "warn");

      // No fallback to non-mention markets — keeps sports/econ out of the base rate DB
      if (allSettled.length > 0 && s.length === 0) {
        const sample = allSettled.slice(0, 3).map(m => m.ticker).join(", ");
        addLog(`Sample tickers: ${sample}`, "warn");
        addLog("No settled mention markets found — showing demo results (non-mention markets excluded)", "warn");
        setBacktestResults(makeDemoResults());
        setBacktesting(false);
        return;
      }

      const rates = buildBaseRates(s);
      const merged = { ...SEED_RATES, ...rates };
      setBaseRates(merged);
      addLog(`Built base rates for ${Object.keys(rates).length} keywords`, "ok");

      // Walk-forward sim
      const sorted = [...s].sort((a, b) => new Date(a.close_time) - new Date(b.close_time));
      const walkDb = {};
      const trades = [];

      const seedKeys = Object.keys(SEED_RATES);
      for (const m of sorted) {
        const rawKw = extractKw(m);
        const kw = matchSeedKey(rawKw, [...seedKeys, ...Object.keys(walkDb)]);
        console.log(`[Backtest] ticker=${m.ticker} extractKw="${rawKw}" → matched="${kw}"`);
        const e = computeEdge(m, { ...SEED_RATES, ...walkDb });
        if (e && Math.abs(e.edge) >= minEdge) {
          const side = e.edge > 0 ? "yes" : "no";
          const correct = side === m.result;
          const entry = side === "yes" ? e.mid : 1 - e.mid;
          const exit = correct ? 1.0 : 0.0; // binary settlement: win = $1, lose = $0
          const pnl = (exit - entry) * maxSize;
          trades.push({ ticker: m.ticker, kw, entry, fv: e.fv, edge: e.edge, result: m.result, pnl, correct });
        }
        if (!walkDb[kw]) walkDb[kw] = { yes: 0, no: 0, rate: 0.5, n: 0 };
        if (m.result === "yes") walkDb[kw].yes++; else walkDb[kw].no++;
        const wn = walkDb[kw].yes + walkDb[kw].no;
        walkDb[kw].n = wn;
        walkDb[kw].rate = (walkDb[kw].yes + 1) / (wn + 2);
      }

      const totalPnl = trades.reduce((s, t) => s + t.pnl, 0);
      const winRate = trades.length ? trades.filter(t => t.correct).length / trades.length : 0;
      setBacktestResults({ trades, totalPnl, winRate, keywords: merged, settled: s.length, lastBacktestTime: new Date().toISOString() });
      addLog(`Backtest complete: ${trades.length} trades, EV=${fmtDollar(totalPnl)}`, totalPnl > 0 ? "ok" : "warn");
    } catch (e) {
      addLog("Backtest failed: " + e.message, "err");
      setBacktestResults({ ...makeDemoResults(), lastBacktestTime: new Date().toISOString() });
    }
    setBacktesting(false);
  }

  function makeDemoResults() {
    const trades = [
      { ticker: "KXTRUMPMENTION-TARIFF", kw: "tariff", entry: 0.60, fv: 0.75, edge: 0.15, result: "yes", pnl: 1.30, correct: true },
      { ticker: "KXTRUMPMENTION-CRYPTO", kw: "crypto", entry: 0.45, fv: 0.22, edge: -0.23, result: "no", pnl: 1.10, correct: true },
      { ticker: "KXTRUMPMENTION-AI", kw: "ai", entry: 0.72, fv: 0.65, edge: -0.07, result: "yes", pnl: -1.70, correct: false },
      { ticker: "KXFOMC-INFLATION", kw: "inflation", entry: 0.55, fv: 0.68, edge: 0.13, result: "yes", pnl: 1.30, correct: true },
      { ticker: "KXTRUMPMENTION-BORDER", kw: "border", entry: 0.62, fv: 0.80, edge: 0.18, result: "yes", pnl: 2.60, correct: true },
    ];
    return { trades, totalPnl: trades.reduce((s,t) => s+t.pnl, 0), winRate: 0.8, keywords: SEED_RATES, settled: 0, isDemo: true };
  }

  // Trade (paper or live)
  async function placeOrder(signal) {
    const side = signal.edge > 0 ? "yes" : "no";
    const price = side === "yes" ? signal.mid : 1 - signal.mid;
    const priceCents = Math.max(1, Math.min(99, Math.round(price * 100)));

    if (mode === "live" && authStatus && authStatus.ok) {
      addLog(`[LIVE] Placing ${side.toUpperCase()} order ${signal.market.ticker} @ ${priceCents}¢ qty=${maxSize}`, "ok");
      try {
        const result = await placeRealOrder(signal.market.ticker, side, priceCents, maxSize);
        const orderId = result.order?.order_id || "live-" + Date.now();
        const ord = { id: orderId, ticker: signal.market.ticker, side, price, qty: maxSize, kw: signal.kw, fv: signal.fv, ts: new Date().toISOString(), status: "open", mode: "live", edge: signal.edge, kellySize: null, sessionId: SESSION_ID };
        setOrders(prev => [ord, ...prev]);
        setPositions(prev => [...prev, { ...ord, status: "open", pnl: 0, entryTime: new Date() }]);
        addLog(`[LIVE] Order placed: ${orderId}`, "ok");
        // Refresh balance
        fetchBalance().then(b => setLiveBalance(b)).catch(() => {});
      } catch(e) {
        addLog(`[LIVE] Order FAILED: ${e.message}`, "err");
      }
    } else {
      // Paper mode
      const ord = makePaperOrder(signal.market.ticker, side, price, maxSize, signal.kw, signal.fv, signal.edge);
      setOrders(prev => [ord, ...prev]);
      setPositions(prev => [...prev, { ...ord, status: "open", pnl: 0, entryTime: new Date() }]);
      addLog(`[PAPER] BUY ${side.toUpperCase()} ${signal.market.ticker} @ ${fmtPct(price)} qty=${maxSize}`, "ok");
    }
  }

  function closePosition(id) {
    setPositions(prev => prev.map(p => {
      if (p.id !== id) return p;
      const exitPrice = Math.min(p.fv, 0.90);
      const pnl = (exitPrice - p.price) * p.qty;
      addLog(`[PAPER] CLOSE ${p.ticker} pnl=${fmtDollar(pnl)}`, pnl >= 0 ? "ok" : "warn");
      return { ...p, status: "closed", pnl };
    }));
  }

  // Auto-scan toggle
  function toggleAutoScan() {
    if (scanInterval.current) {
      clearInterval(scanInterval.current);
      scanInterval.current = null;
      addLog("Auto-scan stopped", "warn");
    } else {
      runScan();
      scanInterval.current = setInterval(runScan, 30000);
      addLog("Auto-scan started (30s interval)", "ok");
    }
  }

  // New-market alert system — polls every 60s for new KXTRUMPMENTION markets
  async function alertPoll() {
    try {
      const ms = await fetchMarkets(seriesFilter);
      const currentTickers = new Set(ms.map(m => m.ticker));
      // Initialize on first poll
      if (knownTickers.current.size === 0) {
        knownTickers.current = currentTickers;
        return;
      }
      const newOnes = ms.filter(m => !knownTickers.current.has(m.ticker));
      if (newOnes.length > 0) {
        const names = newOnes.map(m => m.ticker).join(", ");
        setNewMarketAlert({ tickers: newOnes.map(m => m.ticker), time: new Date() });
        addLog(`🔔 NEW MARKET: ${names}`, "ok");
        // Audio beep alert
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          osc.type = "sine"; osc.frequency.value = 880;
          osc.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.25);
        } catch {}
      }
      knownTickers.current = currentTickers;
    } catch (e) {
      addLog("Alert poll failed: " + e.message, "warn");
    }
  }

  function toggleAlerts() {
    if (alertInterval.current) {
      clearInterval(alertInterval.current);
      alertInterval.current = null;
      addLog("Market alerts stopped", "warn");
    } else {
      alertPoll();
      alertInterval.current = setInterval(alertPoll, 60000);
      addLog("Market alerts started (60s poll)", "ok");
    }
  }

  useEffect(() => () => { clearInterval(scanInterval.current); clearInterval(alertInterval.current); }, []);

  // Auto-scan on load once persisted state is restored
  const autoScannedRef = useRef(false);
  useEffect(() => {
    if (positionsSynced && !autoScannedRef.current) {
      autoScannedRef.current = true;
      runScan();
    }
  }, [positionsSynced]);

  // Clear all persisted data
  function handleClearAll() {
    if (!confirm('This will permanently delete all positions, orders, and settings. Are you sure?')) return;
    fetch('/state', { method: 'DELETE' }).catch(() => {});
    const kbtKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('kbt_')) kbtKeys.push(k);
    }
    kbtKeys.forEach(k => localStorage.removeItem(k));
    window.location.reload();
  }

  // ── Render ──────────────────────────────────────────────────────────────────
  return (
    <div className="app">
      {/* Topbar */}
      <div className="topbar">
        <div className="logo">KALSHI<span>/mentions</span></div>
        <div className="mode-toggle">
          <div className={`mode-btn ${mode === "paper" ? "active" : ""}`} onClick={() => { setMode("paper"); addLog("Switched to paper mode", "warn"); }}>PAPER</div>
          <div className={`mode-btn ${mode === "live" ? "active" : ""}`} onClick={() => { setMode("live"); addLog("⚠️ Switched to LIVE mode", "err"); }}>LIVE</div>
        </div>
        <div className="topbar-status">
          {saving && <span style={{fontSize: 11, color: 'var(--text3)'}}>Saving...</span>}
          {restoredBanner && <span style={{fontSize: 11, color: 'var(--amber)', background: 'var(--amber-dim)', padding: '2px 8px', borderRadius: 'var(--r)', marginRight: 8}}>{restoredBanner}</span>}
          <div className={`dot ${mode === "live" ? "live" : "paper"}`} />
          {mode === "paper" ? "Paper trading" : "Live trading"}
          {lastScan && <span style={{ marginLeft: 12, fontSize: 11, color: "var(--text3)" }}>Last scan {lastScan.toTimeString().slice(0, 8)}</span>}
        </div>
      </div>

      <div className="main">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-section">Trading</div>
          {[
            { id: "scanner", icon: "◎", label: "Scanner", badge: signals.length > 0 ? signals.length : null },
            { id: "positions", icon: "▣", label: "Positions", badge: positions.filter(p => p.status === "open").length || null },
            { id: "orders", icon: "≡", label: "Order Log", badge: null },
          ].map(item => (
            <div key={item.id} className={`nav-item ${tab === item.id ? "active" : ""}`} onClick={() => setTab(item.id)}>
              <span className="nav-icon">{item.icon}</span>
              {item.label}
              {item.badge ? <span className={`nav-badge ${tab === item.id ? "green" : ""}`}>{item.badge}</span> : null}
            </div>
          ))}
          <div className="sidebar-section">Analysis</div>
          {[
            { id: "backtest", icon: "◷", label: "Backtester" },
            { id: "replay", icon: "▶", label: "Replay" },
            { id: "baserates", icon: "∿", label: "Base Rates" },
          ].map(item => (
            <div key={item.id} className={`nav-item ${tab === item.id ? "active" : ""}`} onClick={() => setTab(item.id)}>
              <span className="nav-icon">{item.icon}</span>
              {item.label}
            </div>
          ))}
          <div className="sidebar-section" style={{ marginTop: "auto" }}>Status</div>
          <div style={{ padding: "8px 16px" }}>
            <div className="log-area" ref={logRef} style={{ height: 120 }}>
              {logs.map((l, i) => (
                <div key={i} className="log-line">
                  <span className="log-time">{l.t}</span>
                  <span className={`log-${l.type}`}>{l.msg}</span>
                </div>
              ))}
              {logs.length === 0 && <span style={{ color: "var(--text3)" }}>Waiting...</span>}
            </div>
          </div>
        </div>

        {/* Main content */}
        <div className="content">
          {/* Metrics */}
          <div className="metrics">
            <div className="metric">
              <div className="metric-label">Open Positions</div>
              <div className="metric-value amber">{positions.filter(p => p.status === "open").length}</div>
            </div>
            <div className="metric">
              <div className="metric-label">Total P&L</div>
              <div className={`metric-value ${totalPnl >= 0 ? "green" : "red"}`}>{fmtDollar(totalPnl)}</div>
              <div className="metric-sub">{mode === "paper" ? "paper" : "live"}</div>
            </div>
            <div className="metric">
              <div className="metric-label">Exposure</div>
              <div className="metric-value">${openExposure.toFixed(2)}</div>
            </div>
            <div className="metric">
              <div className="metric-label">Signals</div>
              <div className={`metric-value ${signals.length > 0 ? "green" : ""}`}>{signals.length}</div>
              <div className="metric-sub">min edge {(minEdge * 100).toFixed(0)}¢</div>
            </div>
          </div>

          {/* Tab content */}
          {tab === "scanner" && <ScannerTab signals={signals} markets={markets} scanning={scanning} apiError={apiError}
            onScan={runScan} onAutoScan={toggleAutoScan} onTrade={placeOrder} minEdge={minEdge} mode={mode}
            autoScanActive={!!scanInterval.current} onToggleAlerts={toggleAlerts} alertActive={!!alertInterval.current}
            newMarketAlert={newMarketAlert} onDismissAlert={() => setNewMarketAlert(null)} />}
          {tab === "positions" && <PositionsTab positions={positions} onClose={closePosition} reconciliation={reconciliation} onDismissReconciliation={() => setReconciliation(null)} />}
          {tab === "orders" && <OrdersTab orders={orders} />}
          {tab === "backtest" && <BacktestTab results={backtestResults} backtesting={backtesting}
            onRun={runBacktest} settled={settled} />}
          {tab === "replay" && <ReplayTab baseRates={baseRates} minEdge={minEdge} maxSize={maxSize} addLog={addLog} seriesFilter={seriesFilter} />}
          {tab === "baserates" && <BaseRatesTab baseRates={baseRates} settled={settled} />}
        </div>

        {/* Right panel — config */}
        <div className="right-panel">
          <div className="panel-header">Configuration</div>
          <div className="config-item">
            <div className="config-label">Series filter</div>
            <input type="text" className="config-input" value={seriesFilter} placeholder="e.g. KXTRUMPMENTION"
              onChange={e => setSeriesFilter(e.target.value)} style={{ width: "100%", marginTop: 4 }} />
          </div>
          <div className="config-item">
            <div className="config-label">Min edge: {(minEdge * 100).toFixed(0)}¢</div>
            <input type="range" min="3" max="25" step="1" value={minEdge * 100}
              onChange={e => setMinEdge(Number(e.target.value) / 100)} style={{ marginTop: 6 }} />
          </div>
          <div className="config-item">
            <div className="config-label">Position size: {maxSize} contracts</div>
            <input type="range" min="1" max="100" step="1" value={maxSize}
              onChange={e => setMaxSize(Number(e.target.value))} style={{ marginTop: 6 }} />
          </div>
          <div className="config-item">
            <div className="config-label">Target exit</div>
            <div className="config-value">88¢</div>
          </div>
          <div className="config-item">
            <div className="config-label">Stop loss</div>
            <div className="config-value">25¢</div>
          </div>
          <div className="config-item">

// ── Replay tab ────────────────────────────────────────────────────────────────
function ReplayTab({ baseRates, minEdge, maxSize, addLog, seriesFilter }) {
  const [events, setEvents] = useState(null); // { [event_ticker]: { label, markets[] } }
  const [selectedEvent, setSelectedEvent] = useState("");
  const [selectedMarket, setSelectedMarket] = useState(null);
  const [candles, setCandles] = useState(null);
  const [trades, setTrades] = useState(null);
  const [loadingEvents, setLoadingEvents] = useState(false);
  const [loadingCandles, setLoadingCandles] = useState(false);
  const [fetchError, setFetchError] = useState(null);
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const volumeChartRef = useRef(null);
  const volumeChartInstance = useRef(null);

  const TARGET_EXIT = 0.88;
  const STOP_LOSS = 0.25;

  // Fetch settled events on mount
  useEffect(() => {
    async function load() {
      setLoadingEvents(true);
      setFetchError(null);
      try {
        // Fetch with series_ticker filter to get mention markets specifically
        // Try multiple series tickers to catch KXTRUMPMENTION events
        const seriesToTry = seriesFilter ? [seriesFilter] : ["KXTRUMPMENTION", "KXSOTU", "KXFOMC"];
        let allSettled = [];

        for (const series of seriesToTry) {
          try {
            const params = { status: "settled", limit: "200", series_ticker: series };
            const d = await kalshiFetch("/markets", params);
            const markets = d.markets || [];
            console.log(`[Replay] series_ticker=${series}: API returned ${markets.length} markets`, markets.slice(0, 3));
            allSettled = allSettled.concat(markets);
          } catch (e) {
            console.log(`[Replay] series_ticker=${series} failed: ${e.message}`);
          }
        }

        // Also try without series filter as fallback
        if (allSettled.length === 0) {
          const params = { status: "settled", limit: "200" };
          const d = await kalshiFetch("/markets", params);
          const markets = d.markets || [];
          console.log(`[Replay] No series filter: API returned ${markets.length} markets`, markets.slice(0, 3));
          allSettled = markets;
        }

        const settled = allSettled.filter(isMention).filter(m => m.result === "yes" || m.result === "no");
        console.log(`[Replay] After isMention filter: ${settled.length} markets`, settled.slice(0, 3).map(m => ({ ticker: m.ticker, event_ticker: m.event_ticker })));

        if (settled.length === 0 && allSettled.length > 0) {
          const sample = allSettled.slice(0, 5).map(m => `${m.ticker} (event: ${m.event_ticker || "none"})`).join(", ");
          setFetchError(`Found ${allSettled.length} settled markets but none matched mention filter. Samples: ${sample}`);
        }

        // Group by event_ticker
        const grouped = {};
        for (const m of settled) {
          const et = m.event_ticker || m.ticker;
          if (!grouped[et]) {
            // Build a human-readable label from the event
            const closeDate = m.close_time ? new Date(m.close_time) : null;
            const dateStr = closeDate ? closeDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "";
            // Try to extract event name from title
            const titleParts = (m.title || "").split(/\s+(to|during|in|at)\s+/i);
            const eventName = titleParts.length > 2 ? titleParts.slice(-1)[0].replace(/\?$/, "") : et.replace(/^KX/, "").replace(/-/g, " ");
            grouped[et] = { label: `${eventName} — ${dateStr}`, markets: [] };
          }
          grouped[et].markets.push(m);
        }
        setEvents(grouped);
        addLog(`Replay: loaded ${settled.length} settled markets in ${Object.keys(grouped).length} events`, settled.length > 0 ? "ok" : "warn");
      } catch (e) {
        setFetchError("Failed to load events: " + e.message);
        addLog("Replay: failed to load events — " + e.message, "err");
      }
      setLoadingEvents(false);
    }
    load();
  }, [seriesFilter]);

  // Fetch candlesticks (routing live vs historical) and trades when a market is selected
  async function loadCandles(market) {
    setSelectedMarket(market);
    setCandles(null);
    setTrades(null);
    setLoadingCandles(true);
    try {
      const closeTs = market.close_time ? Math.floor(new Date(market.close_time).getTime() / 1000) : Math.floor(Date.now() / 1000);
      const startTs = closeTs - 48 * 3600;

      // Determine if market is historical by checking cutoff
      let useHistorical = false;
      try {
        const cutoff = await kalshiFetch("/historical/cutoff");
        const cutoffTs = cutoff.market_settled_ts || 0;
        if (cutoffTs && closeTs < cutoffTs) {
          useHistorical = true;
        }
      } catch (e) {
        console.log("[Replay] cutoff check failed, trying live endpoint:", e.message);
      }

      // Fetch candlesticks from the right endpoint
      let sticks = [];
      if (useHistorical) {
        try {
          const d = await kalshiFetch(`/historical/markets/${market.ticker}/candlesticks`, { start_ts: startTs, end_ts: closeTs, period_interval: 1 });
          sticks = d.candlesticks || [];
          addLog(`Replay: fetched ${sticks.length} historical candles for ${market.ticker}`, "ok");
        } catch (e) {
          addLog("Replay: historical candlestick fetch failed — " + e.message, "warn");
        }
      }
      // Try live endpoint if historical didn't work or wasn't needed
      if (sticks.length === 0) {
        try {
          const d = await kalshiFetch(`/series/${market.series_ticker}/markets/${market.ticker}/candlesticks`, { start_ts: startTs, end_ts: closeTs, period_interval: 1 });
          sticks = d.candlesticks || [];
          if (sticks.length > 0) addLog(`Replay: fetched ${sticks.length} live candles for ${market.ticker}`, "ok");
        } catch (e) {
          addLog("Replay: live candlestick fetch failed — " + e.message, "warn");
        }
      }
      if (sticks.length === 0) addLog(`Replay: no candlestick data found for ${market.ticker}`, "warn");
      setCandles(sticks);

      // Fetch individual trades
      try {
        const td = await kalshiFetch("/historical/trades", { ticker: market.ticker, limit: "500" });
        const tradeList = td.trades || [];
        setTrades(tradeList);
        addLog(`Replay: fetched ${tradeList.length} trades for ${market.ticker}`, "ok");
      } catch (e) {
        addLog("Replay: trade fetch failed — " + e.message, "warn");
        setTrades([]);
      }
    } catch (e) {
      addLog("Replay: data fetch failed — " + e.message, "err");
      setCandles([]);
      setTrades([]);
    }
    setLoadingCandles(false);
  }

  // Compute signal data for selected market
  function computeSignalData(market) {
    const edge = computeEdge(market, baseRates);
    if (!edge) return null;
    const side = edge.edge > 0 ? "yes" : "no";
    let midPrice = edge.mid;
    if (!midPrice || midPrice === 0) {
      midPrice = parseFloat(market.last_price_dollars) || 0;
      if (!midPrice) {
        const b = parseFloat(market.yes_bid_dollars) || 0;
        const a = parseFloat(market.yes_ask_dollars) || 0;
        if (b || a) midPrice = b && a ? (b + a) / 2 : (b || a);
      }
    }
    const entryPrice = side === "yes" ? midPrice : 1 - midPrice;
    const correct = side === market.result;
    const exit = correct ? 1.0 : 0.0;
    const pnl = (exit - entryPrice) * maxSize;
    return { ...edge, side, entryPrice, correct, pnl };
  }

  // Render chart when candles change
  useEffect(() => {
    if (!candles || candles.length === 0 || !chartRef.current || !selectedMarket) return;

    // Destroy previous chart
    if (chartInstance.current) {
      chartInstance.current.destroy();
      chartInstance.current = null;
    }

    const sorted = [...candles].sort((a, b) => new Date(a.end_period_ts || a.t) - new Date(b.end_period_ts || b.t));
    const labels = sorted.map(c => {
      const d = new Date(c.end_period_ts || c.t);
      return d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
    });
    const prices = sorted.map(c => {
      // Candlestick may have yes_price, close, or price field — use what's available
      const p = c.yes_close != null ? c.yes_close : c.close != null ? c.close : c.price != null ? c.price : c.yes_price;
      return typeof p === "number" ? p * 100 : parseFloat(p) * 100 || 0;
    });

    const sig = computeSignalData(selectedMarket);
    const resolveTime = selectedMarket.close_time ? new Date(selectedMarket.close_time) : null;

    // Find key points for annotations
    const pointColors = prices.map(() => "transparent");
    const pointRadii = prices.map(() => 0);

    if (sig) {
      const entryPriceCents = sig.entryPrice * 100;
      const targetCents = TARGET_EXIT * 100;
      const stopCents = STOP_LOSS * 100;
      let entryFired = false;
      let tradeDone = false;

      for (let i = 0; i < prices.length; i++) {
        const p = sig.side === "yes" ? prices[i] : 100 - prices[i];

        // Signal entry: price below fair value by more than edge threshold
        if (!entryFired && !tradeDone) {
          const priceFrac = prices[i] / 100;
          const edgeHere = sig.fv - priceFrac;
          if (edgeHere > minEdge) {
            pointColors[i] = "#00d97e";
            pointRadii[i] = 6;
            entryFired = true;
            continue;
          }
        }

        if (entryFired && !tradeDone) {
          // Stop loss
          if (prices[i] <= stopCents) {
            pointColors[i] = "#ff4d4d";
            pointRadii[i] = 6;
            tradeDone = true;
            continue;
          }
          // Target exit
          if (prices[i] >= targetCents) {
            pointColors[i] = "#00d97e";
            pointRadii[i] = 6;
            tradeDone = true;
            continue;
          }
        }
      }
    }

    // Find resolve line index
    let resolveIdx = null;
    if (resolveTime) {
      let minDiff = Infinity;
      sorted.forEach((c, i) => {
        const diff = Math.abs(new Date(c.end_period_ts || c.t) - resolveTime);
        if (diff < minDiff) { minDiff = diff; resolveIdx = i; }
      });
    }

    const ctx = chartRef.current.getContext("2d");
    chartInstance.current = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "YES Price (¢)",
          data: prices,
          borderColor: "#3d9eff",
          borderWidth: 1.5,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: pointRadii,
          pointHoverRadius: pointRadii.map(r => r > 0 ? r + 2 : 0),
          fill: false,
          tension: 0.2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400 },
        scales: {
          x: {
            ticks: { color: "#545b64", font: { family: "'DM Mono', monospace", size: 10 }, maxTicksLimit: 12 },
            grid: { color: "rgba(255,255,255,0.05)" },
          },
          y: {
            min: 0, max: 100,
            ticks: { color: "#545b64", font: { family: "'DM Mono', monospace", size: 10 }, callback: v => v + "¢" },
            grid: { color: "rgba(255,255,255,0.05)" },
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#1e2227",
            borderColor: "rgba(255,255,255,0.12)",
            borderWidth: 1,
            titleFont: { family: "'DM Mono', monospace", size: 11 },
            bodyFont: { family: "'DM Mono', monospace", size: 11 },
            callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + "¢" }
          },
          annotation: resolveIdx !== null ? {
            annotations: {
              resolveLine: {
                type: "line", xMin: resolveIdx, xMax: resolveIdx,
                borderColor: "#ffb830", borderWidth: 1, borderDash: [4, 4],
                label: { display: true, content: "Resolved", color: "#ffb830", font: { size: 10 }, position: "start" }
              }
            }
          } : undefined
        }
      },
      plugins: resolveIdx !== null ? [{
        id: "resolveLine",
        afterDraw(chart) {
          const xScale = chart.scales.x;
          const yScale = chart.scales.y;
          const x = xScale.getPixelForValue(resolveIdx);
          const ctx = chart.ctx;
          ctx.save();
          ctx.beginPath();
          ctx.setLineDash([4, 4]);
          ctx.strokeStyle = "#ffb830";
          ctx.lineWidth = 1;
          ctx.moveTo(x, yScale.top);
          ctx.lineTo(x, yScale.bottom);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "#ffb830";
          ctx.font = "10px 'DM Mono', monospace";
          ctx.fillText("Resolved", x + 4, yScale.top + 12);
          ctx.restore();
        }
      }] : []
    });

    return () => {
      if (chartInstance.current) {
        chartInstance.current.destroy();
        chartInstance.current = null;
      }
    };
  }, [candles, selectedMarket]);

  // Render volume chart when candles change
  useEffect(() => {
    if (!candles || candles.length === 0 || !volumeChartRef.current) return;
    if (volumeChartInstance.current) {
      volumeChartInstance.current.destroy();
      volumeChartInstance.current = null;
    }

    const sorted = [...candles].sort((a, b) => new Date(a.end_period_ts || a.t) - new Date(b.end_period_ts || b.t));
    const labels = sorted.map(c => {
      const d = new Date(c.end_period_ts || c.t);
      return d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
    });
    const volumes = sorted.map(c => parseFloat(c.volume || c.volume_fp || 0));

    const ctx = volumeChartRef.current.getContext("2d");
    volumeChartInstance.current = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Volume",
          data: volumes,
          backgroundColor: "rgba(61,158,255,0.35)",
          borderColor: "rgba(61,158,255,0.6)",
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400 },
        scales: {
          x: {
            ticks: { color: "#545b64", font: { family: "'DM Mono', monospace", size: 10 }, maxTicksLimit: 12 },
            grid: { color: "rgba(255,255,255,0.05)" },
          },
          y: {
            beginAtZero: true,
            ticks: { color: "#545b64", font: { family: "'DM Mono', monospace", size: 10 } },
            grid: { color: "rgba(255,255,255,0.05)" },
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#1e2227",
            borderColor: "rgba(255,255,255,0.12)",
            borderWidth: 1,
            titleFont: { family: "'DM Mono', monospace", size: 11 },
            bodyFont: { family: "'DM Mono', monospace", size: 11 },
            callbacks: { label: ctx => ctx.parsed.y.toLocaleString() + " contracts" }
          }
        }
      }
    });

    return () => {
      if (volumeChartInstance.current) {
        volumeChartInstance.current.destroy();
        volumeChartInstance.current = null;
      }
    };
  }, [candles]);

  const eventKeys = events ? Object.keys(events) : [];
  const currentMarkets = selectedEvent && events ? (events[selectedEvent]?.markets || []) : [];
  const sig = selectedMarket ? computeSignalData(selectedMarket) : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div className="section-header">
        <div className="section-title">Event Replay</div>
      </div>

      {/* Event picker */}
      <div className="card">
        <div className="card-title">▶ Select Event</div>
        {loadingEvents ? (
          <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--text3)", fontSize: 13 }}>
            <div className="scan-pulse" /> Loading settled events...
          </div>
        ) : events && eventKeys.length === 0 ? (
          <div className="empty">
            <div className="empty-msg">No settled mention events found</div>
            {fetchError && <div style={{ marginTop: 8, fontSize: 11, color: "var(--amber)", maxWidth: 500, lineHeight: 1.6 }}>{fetchError}</div>}
          </div>
        ) : (
          <select value={selectedEvent} onChange={e => { setSelectedEvent(e.target.value); setSelectedMarket(null); setCandles(null); setTrades(null); }}
            style={{ width: "100%", padding: "8px 10px" }}>
            <option value="">Choose a past event...</option>
            {eventKeys.map(et => (
              <option key={et} value={et}>{events[et].label} ({events[et].markets.length} markets)</option>
            ))}
          </select>
        )}
      </div>

      {/* Market list */}
      {selectedEvent && currentMarkets.length > 0 && (
        <div className="card">
          <div className="card-title">Markets in Event ({currentMarkets.length})</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Keyword</th><th>Result</th><th>Settlement</th><th></th></tr></thead>
              <tbody>
                {currentMarkets.map((m, i) => {
                  const kw = extractKw(m);
                  const settlePrice = m.result === "yes" ? "100¢" : "0¢";
                  const isSelected = selectedMarket && selectedMarket.ticker === m.ticker;
                  return (
                    <tr key={i} style={isSelected ? { background: "var(--bg4)" } : {}}>
                      <td><span className="keyword">{kw}</span></td>
                      <td><span className={`badge ${m.result === "yes" ? "badge-yes" : "badge-no"}`}>{m.result.toUpperCase()}</span></td>
                      <td><span className="price">{settlePrice}</span></td>
                      <td>
                        <button className={`btn ${isSelected ? "btn-primary" : ""}`}
                          style={{ padding: "3px 10px", fontSize: 11 }}
                          onClick={() => loadCandles(m)}
                          disabled={loadingCandles}>
                          {loadingCandles && isSelected ? "Loading..." : isSelected ? "Viewing" : "View"}
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Price chart */}
      {selectedMarket && (
        <div className="card">
          <div className="card-title" style={{ display: "flex", justifyContent: "space-between" }}>
            <span>Price History — {selectedMarket.ticker}</span>
            <div style={{ display: "flex", gap: 12, fontSize: 10, fontFamily: "var(--font-mono)" }}>
              <span style={{ color: "#00d97e" }}>● Entry/Target</span>
              <span style={{ color: "#ff4d4d" }}>● Stop Loss</span>
              <span style={{ color: "#ffb830" }}>┆ Resolved</span>
            </div>
          </div>
          {loadingCandles ? (
            <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--text3)", fontSize: 13, padding: "20px 0" }}>
              <div className="scan-pulse" /> Fetching candlestick data...
            </div>
          ) : candles && candles.length === 0 ? (
            <div className="empty"><div className="empty-msg">No candlestick data available for this market</div></div>
          ) : (
            <div style={{ height: 300, position: "relative" }}>
              <canvas ref={chartRef} />
            </div>
          )}
        </div>
      )}

      {/* Volume chart */}
      {selectedMarket && candles && candles.length > 0 && !loadingCandles && (
        <div className="card">
          <div className="card-title">Volume</div>
          <div style={{ height: 150, position: "relative" }}>
            <canvas ref={volumeChartRef} />
          </div>
        </div>
      )}

      {/* Trades feed + Signal analysis side by side */}
      {selectedMarket && !loadingCandles && (
        <div style={{ display: "grid", gridTemplateColumns: trades && trades.length > 0 ? "1fr 1fr" : "1fr", gap: 16 }}>
          {/* Individual trades feed */}
          {trades && trades.length > 0 && (
            <div className="card" style={{ maxHeight: 400, display: "flex", flexDirection: "column" }}>
              <div className="card-title">Trade Feed ({trades.length} trades)</div>
              <div style={{ overflow: "auto", flex: 1 }}>
                <table style={{ fontSize: 12 }}>
                  <thead><tr><th>Time</th><th>Price</th><th>Size</th></tr></thead>
                  <tbody>
                    {[...trades].sort((a, b) => new Date(a.created_time || a.ts) - new Date(b.created_time || b.ts)).map((t, i) => {
                      const time = new Date(t.created_time || t.ts);
                      const price = t.yes_price != null ? t.yes_price : t.price;
                      const priceCents = typeof price === "number" ? (price < 1 ? price * 100 : price) : parseFloat(price) * 100 || 0;
                      const size = t.count || t.size || 1;
                      return (
                        <tr key={i}>
                          <td style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text2)", whiteSpace: "nowrap" }}>
                            {time.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}
                          </td>
                          <td style={{ fontFamily: "var(--font-mono)", fontSize: 11 }}>
                            <span className="price">{priceCents.toFixed(0)}¢</span>
                          </td>
                          <td style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text2)" }}>{size}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Signal analysis panel */}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {sig && (
        <div className="card">
          <div className="card-title">Signal Analysis</div>
          <div className="metrics" style={{ gridTemplateColumns: "repeat(3, 1fr)" }}>
            <div className="metric">
              <div className="metric-label">Entry Price</div>
              <div className="metric-value" style={{ fontSize: 18 }}>{fmtPct(sig.entryPrice)}</div>
            </div>
            <div className="metric">
              <div className="metric-label">Fair Value</div>
              <div className="metric-value" style={{ fontSize: 18 }}>{fmtPct(sig.fv)}</div>
            </div>
            <div className="metric">
              <div className="metric-label">Edge</div>
              <div className={`metric-value ${sig.edge > 0 ? "green" : "red"}`} style={{ fontSize: 18 }}>
                {sig.edge > 0 ? "+" : ""}{(sig.edge * 100).toFixed(0)}¢
              </div>
            </div>
            <div className="metric">
              <div className="metric-label">Side</div>
              <div className="metric-value" style={{ fontSize: 14 }}>
                <span className={`badge ${sig.side === "yes" ? "badge-yes" : "badge-no"}`}>{sig.side.toUpperCase()}</span>
              </div>
            </div>
            <div className="metric">
              <div className="metric-label">Simulated P&L</div>
              <div className={`metric-value ${sig.pnl >= 0 ? "green" : "red"}`} style={{ fontSize: 18 }}>
                {fmtDollar(sig.pnl)}
              </div>
              <div className="metric-sub">{maxSize} contracts</div>
            </div>
            <div className="metric">
              <div className="metric-label">Verdict</div>
              <div className={`metric-value ${sig.correct ? "green" : "red"}`} style={{ fontSize: 14 }}>
                {sig.correct ? "CORRECT" : "WRONG"}
              </div>
              <div className="metric-sub">Result: {selectedMarket.result.toUpperCase()}</div>
            </div>
          </div>
        </div>
      )}
      {!sig && (
        <div className="card">
          <div className="card-title">Signal Analysis</div>
          <div className="empty"><div className="empty-msg">No signal data — keyword not in base rate database or no price data available</div></div>
        </div>
      )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
